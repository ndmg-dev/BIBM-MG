name: CI — Validate Backend and Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # BACKEND: Lint, type check, and build test
  # ─────────────────────────────────────────
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Verify FastAPI application imports correctly
        run: python -c "from src.main import app; print('FastAPI app loaded successfully')"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Build Docker image (backend)
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: bibm-mg-backend:ci

  # ─────────────────────────────────────────
  # FRONTEND: Install, lint, and build
  # ─────────────────────────────────────────
  frontend:
    name: Frontend (Node.js 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Next.js production bundle
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          COOLIFY_BUILD_SECRETS_HASH: ${{ secrets.COOLIFY_BUILD_SECRETS_HASH }}

      - name: Build Docker image (frontend)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: bibm-mg-frontend:ci
